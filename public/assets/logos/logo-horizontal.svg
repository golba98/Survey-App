<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <title>SA Economy Survey - Horizontal Logo</title>
  <desc>Horizontal logo with icon and SA Economy Survey text</desc>
  
  <!-- Icon group (left-aligned) -->
  <g id="icon" transform="translate(40, 40)">
    <g fill="none" stroke="#000000" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter">
      <!-- Abstract South Africa shape -->
      <polygon points="50,40 150,40 180,100 150,160 50,160 20,100" />
      
      <!-- Vertical data bars within the shape -->
      <line x1="60" y1="160" x2="60" y2="80" />
      <line x1="80" y1="160" x2="80" y2="60" />
      <line x1="100" y1="160" x2="100" y2="100" />
      <line x1="120" y1="160" x2="120" y2="70" />
      <line x1="140" y1="160" x2="140" y2="90" />
      
      <!-- Horizontal baseline -->
      <line x1="50" y1="160" x2="150" y2="160" />
    </g>
    
    <!-- Subtle survey data point dots -->
    <g fill="#000000">
      <circle cx="70" cy="50" r="3" />
      <circle cx="130" cy="55" r="3" />
      <circle cx="100" cy="85" r="3" />
    </g>
  </g>
  
  <!-- Text group -->
  <g id="text" transform="translate(240, 100)">
    <!-- "SA Economy Survey" in clean, modern typography -->
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif" 
          font-size="48" font-weight="600" letter-spacing="0.5" fill="#000000">
      SA Economy Survey
    </text>
    
    <!-- Optional subtitle for context -->
    <text x="0" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif" 
          font-size="16" font-weight="400" letter-spacing="1" fill="#000000" opacity="0.7">
      Putting the South African Economy Into Perspective
    </text>
  </g>
</svg>