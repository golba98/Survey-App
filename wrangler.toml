# Cloudflare Pages + Functions configuration for 25-survey-app.
# Replace the placeholder database_id after creating your D1 database.
# Add secrets with:
#   wrangler pages secret put EXPORT_TOKEN
#   wrangler pages secret put IP_HASH_SECRET

name = "25-survey-app"
compatibility_date = "2026-06-17"
pages_build_output_dir = "./public"

[[d1_databases]]
binding = "DB"
database_name = "25-survey-app-db"
database_id = "YOUR_D1_DATABASE_ID_HERE"
