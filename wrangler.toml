# Cloudflare Pages + Functions configuration for 25-survey-app.
# Add secrets with:
#   wrangler pages secret put EXPORT_TOKEN --project-name survey-app
#   wrangler pages secret put IP_HASH_SECRET --project-name survey-app
# Optional browser CORS allowlist:
#   ALLOWED_ORIGINS=https://example.com,https://admin.example.com

name = "survey-app"
compatibility_date = "2026-06-17"
pages_build_output_dir = "./public"

[[d1_databases]]
binding = "DB"
database_name = "25-survey-app-db"
database_id = "eeca209b-e57d-45d7-a29c-ec2ef24e57dc"
